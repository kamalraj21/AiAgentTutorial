<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My AI Agent</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f7; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { font-size: 20px; font-weight: 600; color: #1d1d1f; margin: 0 0 4px 0; }
        .subtitle { color: #6e6e73; font-size: 14px; margin-bottom: 20px; }
        label { display: block; font-weight: 500; color: #1d1d1f; margin: 16px 0 8px 0; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 15px; box-sizing: border-box; background: #fff; }
        textarea { min-height: 100px; resize: vertical; line-height: 1.4; }
        button { width: 100%; padding: 14px; background: #0071e3; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
        button:disabled { background: #a1a1a6; cursor: not-allowed; }
        #output { margin-top: 20px; padding: 16px; background: #f5f5f7; border-radius: 8px; white-space: pre-wrap; font-size: 15px; line-height: 1.5; display: none; }
        .error { color: #bf4040; }
    </style>
</head>
<body>
    <div class="container">
        <h1>My AI Agent</h1>
        <p class="subtitle">Configure once. Use anywhere.</p>

        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="Paste your Groq key (starts with gsk_)">

        <label for="systemPrompt">Agent Instructions</label>
        <textarea id="systemPrompt" placeholder="Define your agent's role and rules...">You are a helpful assistant.</textarea>

        <label for="userInput">Your Input</label>
        <textarea id="userInput" placeholder="Paste text or describe your task..."></textarea>

        <button onclick="runAgent()" id="runBtn">Run Agent</button>
        <div id="output"></div>
    </div>

    <script>
        async function runAgent() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const systemPrompt = document.getElementById('systemPrompt').value;
            const userInput = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            const btn = document.getElementById('runBtn');

            if (!apiKey.startsWith('gsk_')) {
                alert('Please enter a valid Groq API key');
                return;
            }
            if (!userInput.trim()) {
                alert('Please enter input for the agent to process');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Processing...';
            output.style.display = 'block';
            output.textContent = 'Working...';
            output.classList.remove('error');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userInput }
                        ],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });

                if (response.status === 401) {
                    throw new Error('Invalid API key. Check your Groq console.');
                }
                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }

                const data = await response.json();
                output.textContent = data.choices[0].message.content;

            } catch (error) {
                output.textContent = 'Error: ' + error.message;
                output.classList.add('error');
            }

            btn.disabled = false;
            btn.textContent = 'Run Agent';
        }
    </script>
</body>
</html>
